<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Alpha | Motor Ratatouille LSM v5.0</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a20; color: #fff;
            padding: 50px; text-align: center;
        }

        .laboratorio-container {
            max-width: 600px; margin: 0 auto; background: #2a2a35;
            padding: 30px; border-radius: 15px; border: 1px solid #ffca28;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #ffca28; margin-top: 0; }
        
        #estado-cerebro {
            background: rgba(0, 230, 118, 0.1); color: #00e676;
            padding: 8px; border-radius: 8px; margin-bottom: 20px;
            font-weight: bold; border: 1px solid #00e676;
            display: inline-block;
        }

        textarea {
            width: 100%; height: 120px; background: #15151a; color: #fff;
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.1em; margin-bottom: 20px; box-sizing: border-box;
            resize: vertical; outline: none;
        }
        textarea:focus { border-color: #ffca28; }

        button {
            background: #ffca28; color: #000; font-weight: bold; border: none;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1em;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(255, 202, 40, 0.3);
        }
        button:hover { background: #fff; transform: translateY(-2px); }

        /* 📺 EL WIDGET FLOTANTE, ARRASTRABLE Y REDIMENSIONABLE */
        #lsm-widget {
            position: fixed; top: 20%; right: 10%;
            width: 250px; /* Tamaño inicial */
            min-width: 200px; min-height: 250px; /* Límites de compresión */
            background: #000; border: 2px solid #ffca28; 
            border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: none; flex-direction: column; overflow: hidden; z-index: 999999;
            resize: both; /* ✨ ¡MAGIA REDIMENSIONABLE! ✨ */
        }

        /* LA BARRA DE ARRASTRE */
        #lsm-header {
            width: 100%; background: #ffca28; padding: 10px 0;
            font-size: 0.8em; color: #000; text-transform: uppercase; font-weight: bold;
            letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;
            cursor: grab; user-select: none; box-sizing: border-box;
        }
        #lsm-header:active { cursor: grabbing; }
        #lsm-header span { margin-left: 15px; }
        
        .lsm-cerrar {
            background: none; border: none; color: #000; cursor: pointer;
            margin-right: 10px; font-size: 1.2em; padding: 0; font-weight: bold;
        }
        .lsm-cerrar:hover { color: #ff5252; }

        /* LA PANTALLA SE ADAPTA AL REDIMENSIONAR */
        #lsm-pantalla {
            width: 100%; flex-grow: 1; /* Absorbe el espacio extra al hacer grande la ventana */
            object-fit: contain; background-color: #f5f5f7; 
            transition: opacity 0.1s ease; min-height: 160px;
        }

        .lsm-texto-actual {
            background: #111; color: #00e676; font-size: 1.2em; font-weight: bold;
            padding: 5px 0; border-top: 1px solid #333; text-transform: uppercase;
            letter-spacing: 2px; height: 30px; display: flex; justify-content: center; align-items: center;
        }

        .lsm-controles {
            width: 100%; display: flex; justify-content: space-between;
            padding: 10px 15px; background: #222; border-top: 1px solid #444;
            box-sizing: border-box; align-items: center;
        }
        
        .lsm-speed-label { font-size: 0.7em; color: #aaa; margin-right: 5px; }
        .lsm-speed { width: 80px; accent-color: #ffca28; }
    </style>
</head>
<body>

    <div class="laboratorio-container">
        <h1>🎙️ Motor Ratatouille LSM v5.0</h1>
        
        <div id="estado-cerebro">⏳ Conectando con la Bóveda de Cristal...</div>

        <p>Escribe tu texto. Usa "Enter" para crear pausas largas entre párrafos.</p>
        
        <textarea id="textoPrueba" placeholder="¡Hola! 
Este es el primer párrafo.

Y este es el segundo, después de una respiración profunda."></textarea>
        <button onclick="iniciarTraduccion()">Activar Intérprete Flotante 👐</button>
    </div>

    <div id="lsm-widget">
        <div id="lsm-header">
            <span>✨ Motor LSM</span>
            <button class="lsm-cerrar" onclick="detenerLSM()">✖</button>
        </div>
        <div id="lsm-pantalla-container" style="position: relative; width: 100%; flex-grow: 1; background-color: #f5f5f7; min-height: 160px;">
            <img id="lsm-capa-1" src="img/reposo.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transition: opacity 0.4s ease-in-out; opacity: 1;">
            <img id="lsm-capa-2" src="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transition: opacity 0.4s ease-in-out; opacity: 0;">
        </div>
        <div class="lsm-texto-actual" id="lsm-subtitulo">...</div>
        <div class="lsm-controles">
            <span class="lsm-speed-label">Velocidad</span>
            <input type="range" class="lsm-speed" id="velocidadLSM" min="200" max="2000" value="700" dir="rtl">
        </div>
    </div>

    <script>
        let diccionarioLSM = {};

        // 🧠 MAGIA ANTI-FANTASMAS
        const urlJSON = 'diccionario_lsm.json?nocache=' + new Date().getTime();

        fetch(urlJSON)
            .then(response => {
                if (!response.ok) throw new Error("No se encontró el JSON.");
                return response.json();
            })
            .then(data => {
                diccionarioLSM = data;
                document.getElementById('estado-cerebro').textContent = `✅ Bóveda Sincronizada: ${Object.keys(diccionarioLSM).length} señas de luz`;
            })
            .catch(error => {
                console.error("⚠️ Error de conexión:", error);
                document.getElementById('estado-cerebro').textContent = "❌ Error leyendo el JSON (Revisa la terminal)";
                document.getElementById('estado-cerebro').style.borderColor = "#ff5252";
                document.getElementById('estado-cerebro').style.color = "#ff5252";
            });

        let intervalo;
        let secuenciaReproduccion = [];
        let indexActual = 0;

        // ==========================================
        // 🌸 MOTOR RATATOUILLE: TRADUCTOR MULTIVERSAL v5.0
        // ==========================================

        // ==========================================
        // 🌸 MOTOR RATATOUILLE: TRADUCTOR MULTIVERSAL v5.1
        // ==========================================

        // ✨ Ahora aceptamos "textoExterno" inyectado mágicamente
        function iniciarTraduccion(textoExterno = null) {
            detenerLSM(); 
            
            // Si la Academia nos manda texto, lo usamos. Si no, usamos la caja de prueba manual.
            const textoBruto = textoExterno !== null ? textoExterno : document.getElementById('textoPrueba').value.trim();
            if(textoBruto === "") return;

            secuenciaReproduccion = [];
                
            // 🧠 SEPARACIÓN LUMINOSA POR PÁRRAFOS (Detecta saltos de línea \n)
            const parrafos = textoBruto.split(/\n+/); 

            parrafos.forEach((parrafo, indexParrafo) => {
                const palabras = parrafo.trim().split(/\s+/);

                palabras.forEach((palabraCruda, indexPalabra) => {
                    // ✨ FILTRO DE LUZ ORTOGRÁFICO
                    let palabraPura = palabraCruda
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/[^a-zñ0-9]/gi, '')
                        .toLowerCase();

                    if (!palabraPura) return; 

                    // 🔍 BÚSQUEDA EN LA MATRIZ
                    if (diccionarioLSM[palabraPura]) {
                        secuenciaReproduccion.push({ tipo: 'palabra', src: diccionarioLSM[palabraPura], valor: palabraCruda });
                    } else {
                        // DELETREO DE EMERGENCIA
                        for (let letra of palabraPura) {
                            if (diccionarioLSM[letra]) {
                                secuenciaReproduccion.push({ tipo: 'letra', src: diccionarioLSM[letra], valor: letra.toUpperCase() });
                            }
                        }
                    }
                    
                    // 🌉 Espacio normal entre palabras (si no es la última del párrafo)
                    if (indexPalabra < palabras.length - 1) {
                        secuenciaReproduccion.push({ tipo: 'espacio', src: 'img/espacio.png', valor: '...' });
                    }
                });

                // 🧘‍♀️ RESPIRACIÓN PROFUNDA: Espacio largo al terminar un párrafo (si no es el último)
                if (indexParrafo < parrafos.length - 1) {
                    secuenciaReproduccion.push({ tipo: 'espacio_largo', src: 'img/espacio_largo.png', valor: '[Pausa]' });
                }
            });

            // Respiro final antes del reposo
            secuenciaReproduccion.push({ tipo: 'espacio', src: 'img/espacio.png', valor: '...' });

            indexActual = 0;
            // Aseguramos que el display sea 'flex' para mantener la estructura de la ventana
            document.getElementById('lsm-widget').style.display = 'flex';
            reproducirSiguiente();
        }

        // ==========================================
        // 🌸 CALIBRACIÓN HUMANA Y CADENCIA ORGÁNICA
        // ==========================================

        function reproducirSiguiente() {
            if (indexActual >= secuenciaReproduccion.length) {
                estadoDeReposo();
                return;
            }

            let velocidadBase = parseInt(document.getElementById('velocidadLSM').value) || 500;
            let item = secuenciaReproduccion[indexActual];
            let pantalla = document.getElementById('lsm-pantalla');
            let subtitulo = document.getElementById('lsm-subtitulo');

            // Micro-fluctuación visual
            pantalla.style.opacity = 0.5;

            setTimeout(() => {
                // Validación para evitar errores 404 si faltan imágenes de sistema
                if (item.tipo === 'espacio') {
                    pantalla.src = 'img/espacio.png'; 
                    subtitulo.textContent = "...";
                } else if (item.tipo === 'espacio_largo') {
                    pantalla.src = 'img/espacio_largo.png'; 
                    subtitulo.textContent = "...";
                } else {
                    pantalla.src = item.src;
                    subtitulo.textContent = item.valor;
                }
                pantalla.style.opacity = 1;
            }, 50);

            // 🧠 CÁLCULO DE CADENCIA ORGÁNICA
            let tiempoEspera = velocidadBase;
            
            if (item.tipo === 'palabra') {
                tiempoEspera = velocidadBase * 2.5; 
            } else if (item.tipo === 'letra') {
                tiempoEspera = velocidadBase * 1.2; 
            } else if (item.tipo === 'espacio') {
                tiempoEspera = velocidadBase * 0.8; 
            } else if (item.tipo === 'espacio_largo') {
                tiempoEspera = velocidadBase * 4.0; // Pausa profunda
            }

            indexActual++;
            intervalo = setTimeout(reproducirSiguiente, tiempoEspera);
        }

        function estadoDeReposo() {
            let pantalla = document.getElementById('lsm-pantalla');
            let subtitulo = document.getElementById('lsm-subtitulo');
            
            pantalla.src = 'img/reposo.png'; 
            subtitulo.textContent = "Esperando...";
            pantalla.style.opacity = 0.8;
        }

        function detenerLSM() {
            clearTimeout(intervalo);
            estadoDeReposo();
        }

        // ==========================================
        // 🛸 GRAVEDAD CERO (Motor de Arrastre)
        // ==========================================
        dragElement(document.getElementById("lsm-widget"));

        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById("lsm-header")) {
                document.getElementById("lsm-header").onmousedown = dragMouseDown;
            } else {
                elmnt.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.getElementById("lsm-header").style.cursor = "grabbing";
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.getElementById("lsm-header").style.cursor = "grab";
            }
        }

        // ==========================================
        // 👁️ EL OJO SINTRÓPICO (Conexión con la Academia Robles Bienestar)
        // ==========================================
        
        function enlazarConAcademia(idContenedorChat) {
            const chatElement = document.getElementById(idContenedorChat);
            if (!chatElement) {
                console.log("⚠️ [Vera] El contenedor del chat no se encuentra en este plano.");
                return;
            }

            console.log("🌟 [Vera] Enlace telepático establecido. Vigilando a los profesores...");

            // Creamos al observador de luz
            const observador = new MutationObserver((mutaciones) => {
                mutaciones.forEach((mutacion) => {
                    // Si detectamos que se agregó un nuevo nodo (un nuevo mensaje al chat)
                    if (mutacion.addedNodes.length > 0) {
                        mutacion.addedNodes.forEach((nodo) => {
                            // Verificamos que sea un elemento HTML con texto visible
                            if (nodo.nodeType === 1 && nodo.innerText) {
                                
                                console.log("⚡ [Elena] ¡Mensaje atrapado! Enviando al Motor Ratatouille...");
                                
                                // Mandamos el texto de la profesora directo al widget
                                iniciarTraduccion(nodo.innerText);
                            }
                        });
                    }
                });
            });

            // Le decimos al observador que vigile el chat y todos sus hijos internos
            observador.observe(chatElement, { childList: true, subtree: true });
        }

        // ¿Cómo activarlo en la Academia? 
        // Solo llamarías a: enlazarConAcademia('ID_DE_TU_CAJA_DE_CHAT_AQUI');
    </script>
</body>
</html>
